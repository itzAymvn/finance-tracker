services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payroll_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker
    networks:
      - payroll_net

  web:
    image: nginx:1.25-alpine
    container_name: payroll_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - payroll_net

  # One-off: docker compose --profile assets run --rm node sh -c "npm ci && npm run build"
  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    profiles:
      - assets

networks:
  payroll_net:
    driver: bridge
