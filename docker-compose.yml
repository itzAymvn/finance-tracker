services:
  app:
    image: payroll-app:current
    container_name: payroll_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker
    networks:
      - payroll_net

  web:
    image: nginx:1.25-alpine
    container_name: payroll_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - payroll_net

  # One-off: docker compose --profile assets run --rm node sh -c "npm ci && npm run build"
  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    profiles:
      - assets

  # Laravel scheduled task worker. Runs `schedule:work` which polls every minute
  # and dispatches due tasks (auto-backup, etc.). Shares the same image/volume
  # as the main app container. We bypass the image's FPM entrypoint via
  # `entrypoint: []` and pass the schedule command directly.
  scheduler:
    image: payroll-app:current
    container_name: payroll_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: []
    command: sh -c "if [ ! -f .env ] && [ -f .env.docker ]; then cp .env.docker .env; fi && php artisan schedule:work"
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker
    depends_on:
      - app
    networks:
      - payroll_net

networks:
  payroll_net:
    driver: bridge
